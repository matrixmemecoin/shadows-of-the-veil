<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadows of the Veil</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Georgia',serif; background:#0a0a12; color:#e8e0d0; height:100vh; overflow:hidden; user-select:none; }
#game { width:100%; height:100vh; position:relative; display:flex; flex-direction:column; }

/* BACKGROUND */
#bg-layer {
  position:absolute; inset:0; z-index:0;
  background-size:cover; background-position:center;
  transition:opacity 1.2s ease;
}
#bg-layer::after {
  content:'';
  position:absolute; inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,0.25) 0%, rgba(0,0,0,0.15) 60%, rgba(0,0,0,0.72) 100%);
}

/* PARTICLES */
#particles { position:absolute; inset:0; z-index:2; pointer-events:none; overflow:hidden; }
.particle { position:absolute; border-radius:50%; animation:floatUp linear infinite; opacity:0; }
@keyframes floatUp {
  0%   { transform:translateY(0) translateX(0); opacity:0; }
  10%  { opacity:1; }
  90%  { opacity:0.5; }
  100% { transform:translateY(-100vh) translateX(20px); opacity:0; }
}

/* TOP BAR */
#top-bar {
  position:relative; z-index:10;
  display:flex; justify-content:space-between; align-items:center;
  padding:14px 24px;
  background:linear-gradient(to bottom,rgba(0,0,0,0.6),transparent);
}
#game-title { font-size:12px; letter-spacing:4px; text-transform:uppercase; color:rgba(220,200,160,0.5); }
#stats { display:flex; gap:20px; }
.stat { display:flex; flex-direction:column; align-items:center; gap:4px; }
.stat-label { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:rgba(220,200,160,0.4); font-family:sans-serif; }
.stat-bar { width:70px; height:2px; background:rgba(255,255,255,0.08); border-radius:2px; overflow:hidden; }
.stat-fill { height:100%; border-radius:2px; transition:width 0.6s ease; }
.temptation-fill { background:linear-gradient(to right,#a05030,#e08050); }
.duty-fill { background:linear-gradient(to right,#304080,#5080d0); }

/* MAIN AREA */
#main { flex:1; position:relative; z-index:5; display:flex; flex-direction:column; justify-content:flex-end; }

/* CHARACTER — full figure left-center */
#char-wrap {
  position:absolute;
  bottom:155px;
  left:50%;
  transform:translateX(-50%);
  z-index:6;
  display:none;
  align-items:flex-end;
  justify-content:center;
  pointer-events:none;
}
#char-img {
  height:62vh;
  max-height:480px;
  width:auto;
  object-fit:contain;
  object-position:bottom;
  transition:opacity 0.5s ease, transform 0.5s ease;
  filter:drop-shadow(0 8px 32px rgba(0,0,0,0.7));
}
#char-img.hidden { opacity:0; transform:translateY(12px); }

/* TITLE SCREEN */
#title-screen {
  position:absolute; inset:0; z-index:20;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
  background:linear-gradient(to bottom, #04080f, #08101a);
  animation:fadeIn 2s ease;
}
.t-eyebrow { font-size:11px; letter-spacing:5px; text-transform:uppercase; color:rgba(200,180,130,0.4); font-family:sans-serif; }
.t-title { font-size:38px; color:#e8d8a8; font-style:italic; text-shadow:0 0 40px rgba(100,150,255,0.3); }
.t-sub { font-size:12px; color:rgba(200,180,130,0.3); letter-spacing:3px; text-transform:uppercase; font-family:sans-serif; }
.t-click { margin-top:30px; font-size:10px; letter-spacing:3px; text-transform:uppercase; font-family:sans-serif; color:rgba(200,180,130,0.25); animation:pulse 2.5s infinite; cursor:pointer; }

/* NAME SCREEN */
#name-screen {
  position:absolute; inset:0; z-index:20;
  display:none; flex-direction:column; align-items:center; justify-content:center; gap:18px;
}
.n-label { font-size:12px; color:rgba(200,180,130,0.5); letter-spacing:3px; text-transform:uppercase; font-family:sans-serif; }
.n-hint { font-size:11px; color:rgba(200,180,130,0.25); font-family:sans-serif; font-style:italic; }
#name-input {
  background:transparent; border:none; border-bottom:1px solid rgba(200,180,130,0.2);
  color:#e8d8a8; font-size:28px; font-family:'Georgia',serif;
  text-align:center; width:320px; padding:8px 0; outline:none; letter-spacing:2px;
}
#name-input::placeholder { color:rgba(200,180,130,0.15); }
#name-confirm {
  margin-top:8px; background:transparent;
  border:1px solid rgba(200,180,130,0.2); color:rgba(200,180,130,0.5);
  font-family:sans-serif; font-size:10px; letter-spacing:3px; text-transform:uppercase;
  padding:11px 32px; cursor:pointer; transition:all 0.3s; border-radius:2px;
}
#name-confirm:hover { background:rgba(200,180,130,0.07); color:#e8d8a8; border-color:rgba(200,180,130,0.45); }

/* DIALOGUE BOX */
#dialogue-wrap {
  position:relative; z-index:10;
  margin:0 24px 20px;
  background:rgba(4,4,12,0.82);
  border:1px solid rgba(200,180,130,0.1);
  border-radius:3px;
  padding:16px 22px 14px;
  backdrop-filter:blur(2px);
  display:none;
  cursor:pointer;
}
#speaker { font-size:11px; letter-spacing:3px; text-transform:uppercase; color:rgba(200,180,130,0.55); font-family:sans-serif; margin-bottom:8px; min-height:16px; }
#dtext { font-size:15px; line-height:1.82; color:#ddd0b0; min-height:44px; }
#cont-hint { position:absolute; bottom:12px; right:18px; font-size:9px; letter-spacing:2px; text-transform:uppercase; color:rgba(200,180,130,0.2); font-family:sans-serif; animation:pulse 2.2s infinite; }

/* CHOICES */
#choices { position:relative; z-index:10; display:none; flex-direction:column; gap:8px; margin:0 24px 20px; }
.cbtn {
  background:rgba(4,4,12,0.85); border:1px solid rgba(200,180,130,0.1);
  color:#c8bc98; font-family:'Georgia',serif; font-size:13px;
  padding:12px 18px; text-align:left; cursor:pointer;
  transition:all 0.22s; border-radius:3px; line-height:1.55;
}
.cbtn:hover { background:rgba(200,180,130,0.06); border-color:rgba(200,180,130,0.28); color:#e8d8a8; transform:translateX(5px); }
.ctag { font-size:9px; letter-spacing:2px; text-transform:uppercase; font-family:sans-serif; margin-right:9px; padding:2px 7px; border-radius:2px; }
.tag-t { background:rgba(180,90,50,0.18); color:#c46040; }
.tag-d { background:rgba(60,100,180,0.18); color:#6090d0; }
.tag-b { background:rgba(80,160,100,0.18); color:#60b070; }

/* NOTIF */
#notif { position:fixed; top:52px; left:50%; transform:translateX(-50%); z-index:30; font-size:10px; letter-spacing:2px; text-transform:uppercase; font-family:sans-serif; padding:7px 18px; border-radius:3px; opacity:0; transition:opacity 0.4s; pointer-events:none; }
.nt { background:rgba(180,90,50,0.12); color:#c46040; border:1px solid rgba(180,90,50,0.25); }
.nd { background:rgba(60,100,180,0.12); color:#6090d0; border:1px solid rgba(60,100,180,0.25); }

/* FADE */
#fade { position:fixed; inset:0; z-index:25; background:#04080f; opacity:0; pointer-events:none; transition:opacity 1s ease; }
#fade.on { opacity:1; pointer-events:all; }

@keyframes pulse { 0%,100%{opacity:0.25} 50%{opacity:0.7} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
</style>
</head>
<body>
<div id="fade"></div>
<div id="notif"></div>
<div id="game">
  <div id="bg-layer"></div>
  <div id="particles"></div>

  <div id="top-bar">
    <div id="game-title">Shadows of the Veil · Ossara</div>
    <div id="stats">
      <div class="stat">
        <div class="stat-label">Temptation</div>
        <div class="stat-bar"><div class="stat-fill temptation-fill" id="t-bar" style="width:0%"></div></div>
      </div>
      <div class="stat">
        <div class="stat-label">Duty</div>
        <div class="stat-bar"><div class="stat-fill duty-fill" id="d-bar" style="width:0%"></div></div>
      </div>
    </div>
  </div>

  <div id="main">
    <!-- Title -->
    <div id="title-screen">
      <div class="t-eyebrow">Ossara</div>
      <div class="t-title">Shadows of the Veil</div>
      <div class="t-sub">Chapter I &mdash; Shattered Veil</div>
      <div class="t-click" id="title-click">Click to begin</div>
    </div>

    <!-- Name -->
    <div id="name-screen">
      <div class="n-label">Your name in this world</div>
      <input type="text" id="name-input" placeholder="Elaraen Voss" maxlength="24" autocomplete="off" spellcheck="false"/>
      <div class="n-hint">Leave blank to use the default name</div>
      <button id="name-confirm">Enter Ossara</button>
    </div>

    <!-- Character figure -->
    <div id="char-wrap">
      <img id="char-img" src="" alt="" class="hidden"/>
    </div>

    <!-- Dialogue -->
    <div id="dialogue-wrap">
      <div id="speaker"></div>
      <div id="dtext"></div>
      <div id="cont-hint">continue ▾</div>
    </div>

    <!-- Choices -->
    <div id="choices"></div>
  </div>
</div>

<script>
// ── ASSETS ───────────────────────────────────────────────
const IMGS = {
  shore:       'https://matrixmemecoin.github.io/shadows-of-the-veil/shore.png',
  haven_ext:   'https://matrixmemecoin.github.io/shadows-of-the-veil/outside.png',
  haven_int:   'https://matrixmemecoin.github.io/shadows-of-the-veil/inside.png',
  lira_normal: 'https://matrixmemecoin.github.io/shadows-of-the-veil/lira.png',
  lira_seduct: 'https://matrixmemecoin.github.io/shadows-of-the-veil/lira sed.png',
  sael_normal: 'https://matrixmemecoin.github.io/shadows-of-the-veil/sael.png',
  sael_seduct: 'https://matrixmemecoin.github.io/shadows-of-the-veil/sael sed.png',
};

// Preload all images
Object.values(IMGS).forEach(src => { const i = new Image(); i.src = src; });

// ── STATE ─────────────────────────────────────────────────
const S = { name:'Elaraen Voss', temptation:0, duty:0, waiting:false, queue:[], qi:0 };
let lastBg = null, lastChar = null;

// ── HELPERS ───────────────────────────────────────────────
function setBg(key) {
  if (key === lastBg) return;
  lastBg = key;
  const el = document.getElementById('bg-layer');
  el.style.opacity = '0';
  setTimeout(() => {
    el.style.backgroundImage = `url(${IMGS[key]})`;
    el.style.opacity = '1';
  }, 400);
}

function setChar(key) {
  const wrap = document.getElementById('char-wrap');
  const img  = document.getElementById('char-img');
  if (!key) {
    img.classList.add('hidden');
    setTimeout(() => { wrap.style.display = 'none'; lastChar = null; }, 500);
    return;
  }
  if (key === lastChar) return;
  lastChar = key;
  img.classList.add('hidden');
  setTimeout(() => {
    img.src = IMGS[key];
    wrap.style.display = 'flex';
    requestAnimationFrame(() => requestAnimationFrame(() => img.classList.remove('hidden')));
  }, 300);
}

function setParticles(type) {
  const c = document.getElementById('particles');
  c.innerHTML = '';
  const cols = {
    blue:   ['#2090c0','#30b0d8','#1a70a0'],
    green:  ['#20a858','#18904a','#30c870'],
    purple: ['#7050b0','#9070d0','#5030a0']
  };
  const pal = cols[type] || cols.blue;
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const s = Math.random() * 3 + 1;
    p.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;bottom:${Math.random()*15}%;background:${pal[i%3]};animation-duration:${7+Math.random()*9}s;animation-delay:${Math.random()*7}s;`;
    c.appendChild(p);
  }
}

function showNotif(txt, type) {
  const el = document.getElementById('notif');
  el.textContent = txt; el.className = type === 't' ? 'nt' : 'nd';
  el.style.opacity = '1';
  setTimeout(() => el.style.opacity = '0', 2200);
}

function updateStats() {
  document.getElementById('t-bar').style.width = Math.min(S.temptation,100)+'%';
  document.getElementById('d-bar').style.width = Math.min(S.duty,100)+'%';
}

function fadeGo(cb) {
  const el = document.getElementById('fade');
  el.classList.add('on');
  setTimeout(() => { cb(); el.classList.remove('on'); }, 900);
}

// ── SCRIPT ────────────────────────────────────────────────
const SCRIPT = [
  { type:'narration', bg:'shore', particles:'blue', char:null,
    text:'Cold waves lap at your legs as consciousness crawls back — slow and heavy. Salt stings the cuts on your arms. Your ribs ache with every breath. The last thing you remember is your couch, the flicker of a screen, and then — nothing.' },
  { type:'narration', bg:'shore', particles:'blue', char:null,
    text:'You open your eyes. Glowing sand pulses beneath you — soft blues and purples, as though the beach itself breathes. Strange trees with neon-veined bark sway at the edge of the mist. The air tastes electric.' },
  { type:'thought', bg:'shore', particles:'blue', char:null,
    text:'This isn\'t a dream. The pain is too real. The cold is too real. Where the hell am I?' },
  { type:'dialogue', speaker:'Lira', bg:'shore', particles:'blue', char:'lira_normal',
    text:'"Oh my... look what the tide dragged in. A lost little human? And quite a handsome one at that."' },
  { type:'dialogue', speaker:'Sael', bg:'shore', particles:'blue', char:'sael_normal',
    text:'"He\'s injured. Stop staring and help me lift him. We can\'t leave him here — the tide isn\'t the worst thing that comes with nightfall."' },
  { type:'narration', bg:'shore', particles:'blue', char:null,
    text:'They kneel beside you. Lira brushes wet hair from your forehead, her touch warm and unhurried. Sael checks your wounds with careful, practiced hands.' },
  { type:'choice', bg:'shore', particles:'blue', char:null,
    choices:[
      { text:'Where am I? I need to get back home — this can\'t be real.', tag:'d', label:'Duty', eff:{duty:15}, next:'duty' },
      { text:'Thank you... both of you. I don\'t know how I got here, but I\'m glad you found me.', tag:'b', label:'Balanced', eff:{}, next:'balanced' },
      { text:'"Are you two real? Because you\'re either a dream or I died somewhere very interesting."', tag:'t', label:'Temptation', eff:{temptation:15}, next:'tempt' }
    ]
  }
];

const BRANCHES = {
  duty:[
    { type:'dialogue', speaker:'Sael', bg:'haven_ext', particles:'green', char:'sael_normal',
      text:'"Good. Keep that focus — you\'ll need it here. You crossed through the Veil. It doesn\'t happen by accident."' },
    { type:'dialogue', speaker:'Lira', bg:'haven_ext', particles:'green', char:'lira_normal',
      text:'"Always so serious, Sael." She glances at you with a soft smile. "You\'re in Ossara. And no — you can\'t simply go back. Not yet."' },
    { next:'haven' }
  ],
  balanced:[
    { type:'dialogue', speaker:'Lira', bg:'haven_ext', particles:'green', char:'lira_normal',
      text:'"Oh, polite. I like that." She tilts her head, ears perked with curiosity. "You\'re in Ossara. Strange world, strange rules. We\'ll explain on the way."' },
    { type:'dialogue', speaker:'Sael', bg:'haven_ext', particles:'green', char:'sael_normal',
      text:'"The Haven is close. Save your questions — walking is easier than talking when you\'re bleeding."' },
    { next:'haven' }
  ],
  tempt:[
    { type:'dialogue', speaker:'Lira', bg:'haven_ext', particles:'green', char:'lira_seduct',
      text:'"Ha!" Her ears perk with delight. "He\'s funny. You\'re very much alive — and this is Ossara. Trust me, it\'s far more interesting than wherever you came from."' },
    { type:'dialogue', speaker:'Sael', bg:'haven_ext', particles:'green', char:'sael_seduct',
      text:'"Focus, both of you." The corner of her mouth twitches — almost a smile. "There\'s a settlement nearby. We move now."' },
    { next:'haven' }
  ],
  haven:[
    { type:'narration', bg:'haven_ext', particles:'purple', char:null,
      text:'The Haven emerges from the forest like a secret the trees have kept for centuries — ancient structures woven into enormous roots, rope bridges between glowing formations, violet orbs drifting lazily overhead.' },
    { type:'narration', bg:'haven_int', particles:'purple', char:null,
      text:'They bring you into a warm healing chamber. Furs, glowing potions on worn shelves, soft amber candlelight. You\'re finally — for the first time since washing ashore — still.' },
    { type:'dialogue', speaker:'Lira', bg:'haven_int', particles:'purple', char:'lira_normal',
      text:'"Rest. The Elders will want to speak with you come morning — a human crossing the Veil isn\'t something that just... happens."' },
    { type:'dialogue', speaker:'Sael', bg:'haven_int', particles:'purple', char:'sael_normal',
      text:'"She\'s right. For once." Sael sets a carved cup of something warm beside you. "Drink. Sleep. Ossara will still be here when you wake."' },
    { type:'thought', bg:'haven_int', particles:'purple', char:null,
      text:'You close your eyes. Outside, the world of Ossara breathes around the Haven — vast, mysterious, indifferent to your confusion. Somehow, that\'s almost comforting.' },
    { type:'end' }
  ]
};

// ── ENGINE ────────────────────────────────────────────────
function processNode(node) {
  if (!node) return;
  if (node.bg)        setBg(node.bg);
  if (node.particles) setParticles(node.particles);
  if ('char' in node) setChar(node.char);

  if (node.next) {
    S.queue = BRANCHES[node.next] || [];
    S.qi = 0; advance(); return;
  }

  if (node.type === 'choice') { showChoices(node); return; }
  if (node.type === 'end')    { showEnd(); return; }

  const dw = document.getElementById('dialogue-wrap');
  const sp = document.getElementById('speaker');
  const dt = document.getElementById('dtext');
  dw.style.display = 'block';

  if (node.type === 'narration') {
    sp.textContent = '';
    dt.style.fontStyle = 'italic';
    dt.style.color = '#b8ac90';
  } else if (node.type === 'thought') {
    sp.textContent = S.name;
    dt.style.fontStyle = 'italic';
    dt.style.color = '#908070';
  } else {
    sp.textContent = node.speaker || '';
    dt.style.fontStyle = 'normal';
    dt.style.color = '#ddd0b0';
  }
  dt.textContent = (node.text||'').replace(/\{name\}/g, S.name);
  S.waiting = true;
}

function advance() {
  if (S.waiting) return;
  if (S.qi < S.queue.length) processNode(S.queue[S.qi++]);
}

function showChoices(node) {
  document.getElementById('dialogue-wrap').style.display = 'none';
  setChar(null);
  const el = document.getElementById('choices');
  el.style.display = 'flex'; el.innerHTML = '';
  node.choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'cbtn';
    const tag = document.createElement('span');
    tag.className = `ctag tag-${c.tag}`;
    tag.textContent = c.label;
    btn.appendChild(tag);
    btn.appendChild(document.createTextNode(c.text));
    btn.addEventListener('click', () => {
      if (c.eff.temptation) { S.temptation += c.eff.temptation; showNotif('Temptation ▲','t'); }
      if (c.eff.duty)       { S.duty += c.eff.duty; showNotif('Duty ▲','d'); }
      updateStats();
      el.style.display = 'none';
      S.queue = BRANCHES[c.next] || []; S.qi = 0; advance();
    });
    el.appendChild(btn);
  });
}

function showEnd() {
  setChar(null);
  const dw = document.getElementById('dialogue-wrap');
  dw.style.display = 'block';
  document.getElementById('speaker').textContent = '';
  const dt = document.getElementById('dtext');
  dt.textContent = '— End of Chapter I —';
  dt.style.fontStyle = 'italic'; dt.style.color = '#907860';
  document.getElementById('cont-hint').style.display = 'none';
  S.waiting = true;
}

// ── CLICK ADVANCE ────────────────────────────────────────
document.getElementById('dialogue-wrap').addEventListener('click', () => {
  if (!S.waiting) return;
  S.waiting = false; advance();
});

// ── TITLE → NAME → GAME ──────────────────────────────────
document.getElementById('title-click').addEventListener('click', () => {
  fadeGo(() => {
    document.getElementById('title-screen').style.display = 'none';
    document.getElementById('name-screen').style.display = 'flex';
    setParticles('blue');
    setBg('shore');
  });
});

function startGame() {
  const v = document.getElementById('name-input').value.trim();
  S.name = v || 'Elaraen Voss';
  fadeGo(() => {
    document.getElementById('name-screen').style.display = 'none';
    S.queue = SCRIPT; S.qi = 0;
    advance();
  });
}

document.getElementById('name-confirm').addEventListener('click', startGame);
document.getElementById('name-input').addEventListener('keydown', e => { if(e.key==='Enter') startGame(); });

// ── INIT ─────────────────────────────────────────────────
setParticles('blue');
</script>
</body>
</html>
